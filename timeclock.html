<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Timeclock - BSC</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script type="module" src="/src/timeclock.ts"></script>
</head>

<body
  x-data="timeclockData"
  @keydown.window="onKeydown($event)"
  class="tc-bg flex flex-col items-center justify-center min-h-dvh font-sans select-none px-4">

  <img src="/nav-logo.png" class="h-14 mb-3" alt="Bennett Cosmetology" />

  <!-- Live clock -->
  <div class="text-center mb-7">
    <div class="font-serif text-4xl text-cream tabular-nums tracking-wide" x-text="currentTime"></div>
    <div class="text-[13px] text-cream/45 mt-1 tracking-[0.04em]" x-text="currentDate"></div>
  </div>

  <div class="bg-white rounded-[14px] shadow-(--shadow-2xl) w-[clamp(300px,90vw,360px)] overflow-hidden">

    <!-- Header -->
    <div class="px-6 pt-5 pb-4 text-center border-b border-app-border">
      <div class="font-serif text-2xl text-app-bg">Student Timeclock</div>
    </div>

    <!-- Body -->
    <div class="px-6 py-6 min-h-[320px] flex flex-col">

      <!-- ── IDLE / LOADING ─────────────────────────────────────────────── -->
      <div x-show="state === 'idle' || state === 'loading'" class="flex flex-col flex-1">

        <p class="text-[13px] text-muted text-center mb-5">Enter your 4-digit PIN</p>

        <!-- PIN dots -->
        <div class="flex justify-center gap-4 mb-6">
          <template x-for="i in [0,1,2,3]" :key="i">
            <div
              class="w-4 h-4 rounded-full border-2 transition-all duration-150"
              :class="pin.length > i ? 'bg-blush border-blush' : 'bg-transparent border-app-border'">
            </div>
          </template>
        </div>

        <!-- Number pad -->
        <div x-show="state === 'idle'" class="grid grid-cols-3 gap-2.5">
          <template x-for="d in ['1','2','3','4','5','6','7','8','9']" :key="d">
            <button
              @click="appendDigit(d)"
              class="h-[58px] rounded-[10px] bg-cream text-charcoal font-semibold text-xl border border-app-border hover:bg-blush/10 active:scale-95 transition-all cursor-pointer">
              <span x-text="d"></span>
            </button>
          </template>
          <!-- bottom row -->
          <div></div>
          <button
            @click="appendDigit('0')"
            class="h-[58px] rounded-[10px] bg-cream text-charcoal font-semibold text-xl border border-app-border hover:bg-blush/10 active:scale-95 transition-all cursor-pointer">
            0
          </button>
          <button
            @click="deleteDigit()"
            class="h-[58px] rounded-[10px] bg-cream text-muted text-2xl border border-app-border hover:bg-blush/10 active:scale-95 transition-all cursor-pointer">
            ⌫
          </button>
        </div>

        <!-- Loading progress bar (replaces spinner) -->
        <div x-show="state === 'loading'" style="display:none" class="flex flex-col justify-center flex-1 gap-3">
          <p class="text-[13px] text-muted text-center">Looking up PIN…</p>
          <div class="w-full h-[3px] bg-app-border rounded-full overflow-hidden">
            <div class="h-full bg-blush rounded-full tc-loading-bar"></div>
          </div>
        </div>
      </div>

      <!-- ── ACTIONS ────────────────────────────────────────────────────── -->
      <div x-show="state === 'actions'" style="display:none" class="flex flex-col flex-1">

        <!-- Inactivity warning banner — appears after 7s of no interaction -->
        <div
          x-show="showingCountdown && state === 'actions'"
          style="display:none"
          class="mb-4 -mx-6 -mt-6 px-6 pt-3 pb-3 bg-blush-light/60">
          <span class="text-[11px] font-semibold text-blush uppercase tracking-[0.07em]">Returning to PIN screen…</span>
        </div>

        <!-- Student identity -->
        <div class="text-center mb-6">
          <div
            class="w-16 h-16 rounded-full bg-blush text-white flex items-center justify-center font-bold text-xl mx-auto mb-3"
            x-text="studentInitials">
          </div>
          <div class="text-[19px] font-semibold text-charcoal" x-text="student?.name ?? ''"></div>
          <div class="text-[13px] text-muted mt-1" x-text="statusLabel"></div>
        </div>

        <!-- Action buttons -->
        <div class="flex flex-col gap-2.5">

          <!-- Clock In — shown when clocked out -->
          <button
            x-show="clockStatus === 'clocked_out'"
            @click="doClockIn()"
            :disabled="actionLoading"
            class="w-full h-12 rounded-[10px] bg-sage text-white font-semibold text-[15px] cursor-pointer hover:opacity-90 active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed inline-flex items-center justify-center gap-2">
            <span x-show="!actionLoading">Clock In</span>
            <span x-show="actionLoading" style="display:none" class="inline-flex items-center gap-2">
              <span class="spinner"></span>Clocking in…
            </span>
          </button>

          <!-- Start Break — shown when clocked in -->
          <button
            x-show="clockStatus === 'clocked_in'"
            @click="doStartBreak()"
            :disabled="actionLoading"
            class="w-full h-12 rounded-[10px] bg-blush text-white font-semibold text-[15px] cursor-pointer hover:opacity-90 active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed inline-flex items-center justify-center gap-2">
            <span x-show="!actionLoading">Start Break</span>
            <span x-show="actionLoading" style="display:none" class="inline-flex items-center gap-2">
              <span class="spinner"></span>…
            </span>
          </button>

          <!-- Clock Out — shown when clocked in -->
          <button
            x-show="clockStatus === 'clocked_in'"
            @click="doClockOut()"
            :disabled="actionLoading"
            class="w-full h-12 rounded-[10px] border border-app-border text-charcoal font-medium text-[15px] cursor-pointer hover:bg-cream active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed inline-flex items-center justify-center gap-2">
            <span x-show="!actionLoading">Clock Out</span>
            <span x-show="actionLoading" style="display:none" class="inline-flex items-center gap-2">
              <span class="spinner text-muted"></span>…
            </span>
          </button>

          <!-- End Break — shown when on break -->
          <button
            x-show="clockStatus === 'on_break'"
            @click="doEndBreak()"
            :disabled="actionLoading"
            class="w-full h-12 rounded-[10px] bg-sage text-white font-semibold text-[15px] cursor-pointer hover:opacity-90 active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed inline-flex items-center justify-center gap-2">
            <span x-show="!actionLoading">End Break</span>
            <span x-show="actionLoading" style="display:none" class="inline-flex items-center gap-2">
              <span class="spinner"></span>Ending break…
            </span>
          </button>

          <!-- Cancel -->
          <button
            @click="reset()"
            :disabled="actionLoading"
            class="w-full h-9 text-muted text-[13px] cursor-pointer hover:text-charcoal transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            Cancel
          </button>
        </div>
      </div>

      <!-- ── SUCCESS ────────────────────────────────────────────────────── -->
      <div x-show="state === 'success'" style="display:none"
        class="flex flex-col flex-1 items-center justify-center text-center py-2">
        <div class="w-16 h-16 rounded-full bg-sage/15 flex items-center justify-center mx-auto mb-4">
          <svg class="text-sage" xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div>
        <p class="text-[16px] font-semibold text-charcoal" x-text="successMsg"></p>
      </div>

      <!-- ── ERROR ──────────────────────────────────────────────────────── -->
      <div x-show="state === 'error'" style="display:none"
        class="flex flex-col flex-1 items-center justify-center text-center py-2">
        <div class="w-16 h-16 rounded-full bg-error-light flex items-center justify-center mx-auto mb-4">
          <svg class="text-app-error" xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </div>
        <p class="text-[14px] font-semibold text-app-error" x-text="errorMsg"></p>
      </div>

    </div>

    <!-- Global countdown bar — drains right-to-left before every reset to PIN pad -->
    <div x-show="showingCountdown" style="display:none" class="h-0.75 bg-app-border overflow-hidden rounded-b-card">
      <div
        class="h-full bg-blush"
        :style="`width: ${countdownProgress}%; transition: width 50ms linear`">
      </div>
    </div>
  </div>

</body>
</html>
